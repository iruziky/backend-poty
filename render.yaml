databases:
  - name: potynews-db
    plan: free
    databaseName: poty
    user: poty

services:
  - type: web
    name: potynews-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Sobrescreve o CMD do Dockerfile (que usa --reload para dev local).
    # Render executa dockerCommand sem shell — por isso usamos um script.
    dockerCommand: /code/start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: potynews-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_DAYS
        value: "7"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: CORS_ORIGINS
        value: "*"
      - key: TZ
        value: America/Sao_Paulo
